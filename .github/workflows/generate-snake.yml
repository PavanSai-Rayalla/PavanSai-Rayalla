name: Generate Snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: PavanSai-Rayalla
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=%2314b8a6&color_dots=%23dbeafe,%2393c5fd,%2360a5fa,%232563eb,%230f172a
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%2314b8a6&color_dots=%230f172a,%231d4ed8,%2306b6d4,%2314b8a6,%23e2e8f0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish generated files
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist
          force_orphan: true
